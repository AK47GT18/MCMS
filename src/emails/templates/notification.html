<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - MCMS Notification</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-font-smoothing: antialiased;">
    <table role="presentation" style="width: 100%; border-collapse: collapse;">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table role="presentation" style="width: 100%; max-width: 650px; border-collapse: separate; border-spacing: 0; background-color: #ffffff; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); overflow: hidden; border: 1px solid #e2e8f0;">
                    
                    <!-- Header -->
                    <tr>
                        <td style="background: #ffffff; padding: 40px 0; text-align: center; border-bottom: 4px solid #f97415;">
                            <div style="font-size: 56px; line-height: 1; margin-bottom: 12px;">🏗️</div>
                            <h1 style="color: #0f1729; margin: 0; font-size: 22px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">Mkaka <span style="color: #f97415;">Construction</span></h1>
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td style="padding: 48px; color: #334155; font-size: 15px; line-height: 1.6;">
                            <h2 style="color: #0f1729; margin-top: 0; font-size: 20px;">Notification</h2>
                            <p style="margin-bottom: 25px;">Hello <strong>{{name}}</strong>,</p>

                            <!-- Notification Box -->
                            <div style="background-color: #fffaf5; border-left: 4px solid #f97415; border-radius: 0 8px 8px 0; padding: 25px; margin-bottom: 35px;">
                                <h3 style="color: #f97415; margin: 0 0 10px 0; font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px;">
                                    <span style="font-size: 20px;">🔔</span> {{title}}
                                </h3>
                                <p style="color: #475569; margin: 0; font-size: 15px; line-height: 1.6;">{{message}}</p>
                            </div>

                            <!-- Action Button -->
                            <table role="presentation" style="width: 100%; margin: 0 0 35px;">
                                <tr>
                                    <td align="center">
                                        <a href="{{actionUrl}}" style="background: #f97415; color: #ffffff; text-decoration: none; padding: 14px 32px; border-radius: 8px; font-weight: 700; font-size: 15px; display: inline-block; text-transform: uppercase; letter-spacing: 0.5px;">View Details</a>
                                    </td>
                                </tr>
                            </table>

                            <p style="color: #94a3b8; font-size: 13px; line-height: 1.5; margin: 0;">You can manage your notification preferences in your dashboard settings.</p>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="background-color: #f8fafc; padding: 32px 48px; text-align: center; border-top: 1px solid #e2e8f0;">
                            <p style="color: #64748b; font-size: 13px; margin: 0 0 6px; font-weight: 700; text-transform: uppercase;">MCMS Portal</p>
                            <p style="color: #94a3b8; font-size: 12px; margin: 0;">&copy; {{year}} Mkaka Construction. All rights reserved.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
